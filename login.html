<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FocusFlow – Login & Signup</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #eef2ff 0%, #e0e7ff 100%);
    }

    .auth-container {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 20px 60px rgba(79, 70, 229, 0.15);
      width: 100%;
      max-width: 420px;
      padding: 40px;
    }

    .auth-header {
      text-align: center;
      margin-bottom: 32px;
    }

    .auth-header h1 {
      font-size: 1.8rem;
      color: #1e1b4b;
      margin-bottom: 8px;
    }

    .auth-header p {
      color: #666;
      font-size: 0.95rem;
    }

    .tabs {
      display: flex;
      gap: 16px;
      margin-bottom: 32px;
      border-bottom: 2px solid #e5e7eb;
    }

    .tab-btn {
      flex: 1;
      padding: 12px;
      background: none;
      border: none;
      cursor: pointer;
      font-size: 1rem;
      font-weight: 600;
      color: #999;
      transition: all 0.3s;
      border-bottom: 3px solid transparent;
      margin-bottom: -2px;
    }

    .tab-btn.active {
      color: #4f46e5;
      border-bottom-color: #4f46e5;
    }

    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-group label {
      display: block;
      margin-bottom: 6px;
      color: #333;
      font-weight: 500;
      font-size: 0.95rem;
    }

    .form-group input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #e5e7eb;
      border-radius: 6px;
      font-size: 1rem;
      transition: border-color 0.3s;
      font-family: inherit;
    }

    .form-group input:focus {
      outline: none;
      border-color: #4f46e5;
      box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
    }

    .auth-btn {
      width: 100%;
      padding: 12px;
      background: #4f46e5;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      margin-top: 8px;
    }

    .auth-btn:hover {
      background: #3730a3;
      transform: translateY(-2px);
    }

    .auth-btn:disabled {
      background: #cbd5e1;
      cursor: not-allowed;
      transform: none;
    }

    .error-message {
      color: #ef4444;
      font-size: 0.9rem;
      margin-top: 8px;
      display: none;
    }

    .error-message.show {
      display: block;
    }

    .success-message {
      color: #10b981;
      font-size: 0.9rem;
      margin-top: 8px;
      display: none;
    }

    .success-message.show {
      display: block;
    }

    .back-link {
      text-align: center;
      margin-top: 20px;
    }

    .back-link a {
      color: #4f46e5;
      text-decoration: none;
      font-weight: 500;
      transition: color 0.2s;
    }

    .back-link a:hover {
      color: #3730a3;
    }

    .loading {
      display: none;
      text-align: center;
      color: #4f46e5;
    }
  </style>
</head>
<body>
  <div class="auth-container">
    <div class="auth-header">
      <h1>FocusFlow</h1>
      <p>Stay Productive</p>
    </div>

    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('login')">Login</button>
      <button class="tab-btn" onclick="switchTab('signup')">Sign Up</button>
    </div>

    <!-- Login Tab -->
    <div id="login" class="tab-content active">
      <form onsubmit="handleLogin(event)">
        <div class="form-group">
          <label for="login-username">Username</label>
          <input type="text" id="login-username" required />
        </div>
        <div class="form-group">
          <label for="login-password">Password</label>
          <input type="password" id="login-password" required />
        </div>
        <div class="error-message" id="login-error"></div>
        <div class="success-message" id="login-success"></div>
        <button type="submit" class="auth-btn" id="login-btn">Login</button>
      </form>
    </div>

    <!-- Signup Tab -->
    <div id="signup" class="tab-content">
      <form onsubmit="handleSignup(event)">
        <div class="form-group">
          <label for="signup-username">Username</label>
          <input type="text" id="signup-username" required />
        </div>
        <div class="form-group">
          <label for="signup-email">Email</label>
          <input type="email" id="signup-email" required />
        </div>
        <div class="form-group">
          <label for="signup-password">Password</label>
          <input type="password" id="signup-password" required />
        </div>
        <div class="error-message" id="signup-error"></div>
        <div class="success-message" id="signup-success"></div>
        <button type="submit" class="auth-btn" id="signup-btn">Sign Up</button>
      </form>
    </div>

    <div class="back-link">
      <a href="index.html">← Back to Home</a>
    </div>
  </div>

  <script>
    const API_URL = "http://localhost:8001";

    function switchTab(tab) {
      document.querySelectorAll(".tab-content").forEach((el) => {
        el.classList.remove("active");
      });
      document.querySelectorAll(".tab-btn").forEach((el) => {
        el.classList.remove("active");
      });

      document.getElementById(tab).classList.add("active");
      event.target.classList.add("active");

      // Clear messages
      document.querySelectorAll(".error-message, .success-message").forEach((el) => {
        el.classList.remove("show");
      });
    }

    async function handleLogin(event) {
      event.preventDefault();

      const username = document.getElementById("login-username").value;
      const password = document.getElementById("login-password").value;
      const loginBtn = document.getElementById("login-btn");
      const errorDiv = document.getElementById("login-error");
      const successDiv = document.getElementById("login-success");

      loginBtn.disabled = true;
      errorDiv.classList.remove("show");
      successDiv.classList.remove("show");

      try {
        const response = await fetch(`${API_URL}/auth/login`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify({ username, password }),
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.detail || "Login failed");
        }

        // Store token
        localStorage.setItem("token", data.token);
        localStorage.setItem("username", data.username);

        successDiv.textContent = "Login successful! Redirecting...";
        successDiv.classList.add("show");

        setTimeout(() => {
          window.location.href = "dashboard.html";
        }, 1500);
      } catch (error) {
        errorDiv.textContent = error.message;
        errorDiv.classList.add("show");
      } finally {
        loginBtn.disabled = false;
      }
    }

    async function handleSignup(event) {
      event.preventDefault();

      const username = document.getElementById("signup-username").value;
      const email = document.getElementById("signup-email").value;
      const password = document.getElementById("signup-password").value;
      const signupBtn = document.getElementById("signup-btn");
      const errorDiv = document.getElementById("signup-error");
      const successDiv = document.getElementById("signup-success");

      signupBtn.disabled = true;
      errorDiv.classList.remove("show");
      successDiv.classList.remove("show");

      try {
        const response = await fetch(`${API_URL}/auth/signup`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify({ username, email, password }),
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.detail || "Signup failed");
        }

        // Store token
        localStorage.setItem("token", data.token);
        localStorage.setItem("username", data.username);

        successDiv.textContent = "Account created! Redirecting to dashboard...";
        successDiv.classList.add("show");

        setTimeout(() => {
          window.location.href = "dashboard.html";
        }, 1500);
      } catch (error) {
        errorDiv.textContent = error.message;
        errorDiv.classList.add("show");
      } finally {
        signupBtn.disabled = false;
      }
    }

    // Check if already logged in
    window.addEventListener("load", () => {
      const token = localStorage.getItem("token");
      if (token) {
        window.location.href = "dashboard.html";
      }
    });
  </script>
</body>
</html>
